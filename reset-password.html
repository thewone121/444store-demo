<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — 444 Store</title>
  <meta name="theme-color" content="#0b0b0d">
  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="preloader" aria-hidden="true"><div class="preloader-mark"><span>4</span><span>4</span><span>4</span></div><div class="preloader-bar"></div></div>

  <div class="auth-layout">
    <div class="auth-visual">
      <div class="hero-numeral" aria-hidden="true">444</div>
      <a href="index.html" class="logo" style="color:var(--c-ivory); position:relative; z-index:2;">444<small>Store</small></a>
      <blockquote class="auth-visual-quote">"Set something strong. Your account guards your orders, your wishlist and your story with us."<span>— The 444 Store Studio, Accra</span></blockquote>
    </div>

    <div class="auth-form-side">
      <div class="auth-box">
        <h1>Create a new password.</h1>
        <p class="sub">Your identity is verified. Choose a new password to secure your account.</p>

        <form data-auth-form="login.html">
          <div class="field password-field">
            <label for="registerPassword">New Password</label>
            <input type="password" id="registerPassword" required placeholder="Minimum 8 characters">
            <button type="button" class="password-toggle">Show</button>
            <div class="password-strength" id="passwordStrength"><i></i><i></i><i></i><i></i></div>
          </div>
          <div class="field password-field">
            <label for="confirmPassword">Confirm New Password</label>
            <input type="password" id="confirmPassword" required placeholder="Re-enter password">
            <button type="button" class="password-toggle">Show</button>
          </div>
          <button type="submit" class="btn btn--primary btn--block">Reset Password <span class="btn-arrow">→</span></button>
        </form>

        <p class="auth-foot"><a href="login.html">← Back to Sign In</a></p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
