<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — 444 Store</title>
  <meta name="theme-color" content="#0b0b0d">
  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="preloader" aria-hidden="true"><div class="preloader-mark"><span>4</span><span>4</span><span>4</span></div><div class="preloader-bar"></div></div>

  <div class="auth-layout">
    <div class="auth-visual">
      <div class="hero-numeral" aria-hidden="true">444</div>
      <a href="index.html" class="logo" style="color:var(--c-ivory); position:relative; z-index:2;">444<small>Store</small></a>
      <blockquote class="auth-visual-quote">"Join a growing community of Accra creatives who wear their foundation, not just a trend."<span>— The 444 Store Studio, Accra</span></blockquote>
    </div>

    <div class="auth-form-side">
      <div class="auth-box">
        <h1>Create your account.</h1>
        <p class="sub">Join The 444 List for early drop access, order tracking and a faster checkout.</p>

        <div class="social-auth">
          <button type="button"><svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.99.66-2.25 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.85A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.84 14.09A6.6 6.6 0 0 1 5.5 12c0-.73.13-1.43.34-2.09V7.05H2.18A11 11 0 0 0 1 12c0 1.78.43 3.46 1.18 4.95l3.66-2.86z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1a11 11 0 0 0-9.82 6.05l3.66 2.85C6.71 7.31 9.14 5.38 12 5.38z"/></svg> Continue with Google</button>
          <button type="button"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M16.365 1.43c0 1.14-.462 2.06-1.036 2.71-.63.72-1.67 1.27-2.6 1.2-.12-1.1.44-2.24 1.03-2.87.65-.72 1.78-1.24 2.6-1.04zm3.7 17.02c-.5 1.13-.74 1.63-1.38 2.63-.9 1.4-2.16 3.15-3.73 3.16-1.4.02-1.76-.9-3.65-.9-1.9 0-2.3.88-3.7.92-1.53.05-2.7-1.5-3.6-2.9-2-3-3.5-8.5-1.47-12.2 1-1.83 2.8-2.99 4.75-3.02 1.44-.02 2.8.97 3.65.97.86 0 2.5-1.2 4.2-1.02.72.03 2.73.29 4.03 2.2-.1.06-2.4 1.4-2.38 4.2.03 3.35 2.94 4.46 2.98 4.48z"/></svg> Continue with Apple</button>
        </div>

        <div class="auth-divider">or sign up with email</div>

        <form data-auth-form="otp-verification.html">
          <div class="field-grid">
            <div class="field"><label for="firstNameReg">First Name</label><input type="text" id="firstNameReg" required></div>
            <div class="field"><label for="lastNameReg">Last Name</label><input type="text" id="lastNameReg" required></div>
          </div>
          <div class="field"><label for="regEmail">Email Address</label><input type="email" id="regEmail" required placeholder="you@email.com"></div>
          <div class="field"><label for="regPhone">Phone Number</label><input type="tel" id="regPhone" required placeholder="+233"></div>
          <div class="field password-field">
            <label for="registerPassword">Password</label>
            <input type="password" id="registerPassword" required placeholder="Minimum 8 characters">
            <button type="button" class="password-toggle">Show</button>
            <div class="password-strength" id="passwordStrength"><i></i><i></i><i></i><i></i></div>
          </div>
          <label class="checkbox-row" style="margin-bottom: var(--space-6);">
            <input type="checkbox" required>
            <span>I agree to the <a href="terms.html" style="text-decoration:underline;">Terms of Service</a> and <a href="privacy-policy.html" style="text-decoration:underline;">Privacy Policy</a></span>
          </label>
          <button type="submit" class="btn btn--primary btn--block">Create Account <span class="btn-arrow">→</span></button>
        </form>

        <p class="auth-foot">Already have an account? <a href="login.html">Sign in</a></p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
