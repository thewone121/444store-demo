<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — 444 Store</title>
  <meta name="theme-color" content="#0b0b0d">
  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="preloader" aria-hidden="true"><div class="preloader-mark"><span>4</span><span>4</span><span>4</span></div><div class="preloader-bar"></div></div>

  <div class="auth-layout">
    <div class="auth-visual">
      <div class="hero-numeral" aria-hidden="true">444</div>
      <a href="index.html" class="logo" style="color:var(--c-ivory); position:relative; z-index:2;">444<small>Store</small></a>
      <blockquote class="auth-visual-quote">"Alignment starts with a reset. Let's get you back into your account."<span>— The 444 Store Studio, Accra</span></blockquote>
    </div>

    <div class="auth-form-side">
      <div class="auth-box">
        <h1>Forgot your password?</h1>
        <p class="sub">Enter the email address linked to your account and we'll send a verification code to reset it.</p>

        <form data-auth-form="otp-verification.html">
          <div class="field">
            <label for="fpEmail">Email Address</label>
            <input type="email" id="fpEmail" required placeholder="you@email.com">
          </div>
          <button type="submit" class="btn btn--primary btn--block">Send Reset Code <span class="btn-arrow">→</span></button>
        </form>

        <p class="auth-foot">Remembered your password? <a href="login.html">Back to Sign In</a></p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
